<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioVerse — Brain Explorer</title>
  <link rel="stylesheet" href="src/style.css" />
  <style>
    body { overflow: hidden; display: block; place-items: unset; background: var(--bg-deep); }
    canvas { display: block; }

    /* Neural synapse background pulses */
    #synapse-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Scan-line overlay */
    body::after {
      background: none; /* override global */
    }

    .scan-overlay {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(99,210,255,0.012) 3px,
        rgba(99,210,255,0.012) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Neural activity label */
    .neural-tag {
      position: fixed;
      top: 62px; right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-cyan);
      z-index: 1100;
      opacity: 0.7;
    }

    .neural-tag .blink {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 8px var(--accent-cyan);
      animation: blink-node 1.4s ease-in-out infinite;
    }

    @keyframes blink-node {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <canvas id="synapse-bg"></canvas>
  <div class="scan-overlay"></div>

  <!-- NAV -->
  <nav class="page-header">
    <span class="logo-dot"></span>
    <strong>Brain Explorer</strong>
    <a class="back-link" href="index.html">← Back to CardioVerse</a>
  </nav>

  <!-- Neural activity indicator -->
  <div class="neural-tag">
    <span class="blink"></span>
    Neural Scan Active
  </div>

  <!-- Checkpoint overlay -->
  <div id="textOverlay">
    <div id="checkpointTitle"></div>
    <div id="checkpointDesc"></div>
  </div>

  <!-- Language toggle -->
  <div id="langButtons">
    <button id="lang-en" class="active" aria-label="English">EN</button>
    <button id="lang-ms" aria-label="Malay">BM</button>
  </div>

  <!-- 3D canvas + JS -->
  <div id="container">
    <div id="canvasContainer"></div>
    <div id="checkpointInfo"    style="display:none;"></div>
    <div id="checkpointButtons" style="display:none;">
      <button id="prevCheckpoint">Previous</button>
      <button id="nextCheckpoint">Next</button>
    </div>
    <script type="module" src="/src/brain.js"></script>

    <!-- Info popup -->
    <div id="infoPopup">
      <h2 id="popupTitle">Title</h2>
      <p  id="popupText">Explanation text goes here.</p>
      <button onclick="document.getElementById('infoPopup').style.display='none'">Close</button>
    </div>
  </div>

  <script>
    /* ── Synapse background network ── */
    const cv  = document.getElementById('synapse-bg');
    const ctx = cv.getContext('2d');
    let W, H, nodes = [];

    function resize() {
      W = cv.width  = window.innerWidth;
      H = cv.height = window.innerHeight;
    }

    function initNodes() {
      nodes = Array.from({ length: 38 }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        r:  Math.random() * 1.8 + 0.5,
        a:  Math.random() * 0.5 + 0.1,
        pulse: Math.random() * Math.PI * 2,
      }));
    }

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.012;

      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0) n.x = W; if (n.x > W) n.x = 0;
        if (n.y < 0) n.y = H; if (n.y > H) n.y = 0;
        n.pulse += 0.04;

        const glow = 0.5 + 0.5 * Math.sin(n.pulse);
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * (1 + 0.3 * glow), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(99,210,255,${n.a * glow})`;
        ctx.fill();
      });

      /* Synapse connections with animated spark */
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < 130) {
            const alpha = 0.07 * (1 - d / 130);
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(99,210,255,${alpha})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initNodes(); });
    resize(); initNodes(); draw();
  </script>

</body>
</html>
