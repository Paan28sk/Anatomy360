<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioVerse — Heart Explorer</title>
  <link rel="stylesheet" href="src/style.css" />
  <style>
    body { overflow: hidden; display: block; place-items: unset; background: var(--bg-deep); }
    canvas { display: block; }

    /* Accent override for heart page — rose tones */
    #infoPopup button { background: linear-gradient(135deg, #ff5e7e, #c0392b); }
    .heart-label { border-color: rgba(255, 94, 126, 0.4); }
    .heart-label:hover { border-color: var(--accent-rose); background: rgba(255,94,126,0.12); box-shadow: 0 0 12px rgba(255,94,126,0.25); }
    #langButtons button.active { background: rgba(255,94,126,0.15); color: var(--accent-rose); border-color: rgba(255,94,126,0.4); }

    /* Heartbeat pulse ring behind canvas */
    #pulse-ring {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 320px; height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(255,94,126,0.15);
      pointer-events: none;
      z-index: 0;
      animation: pulse-ring 2.8s ease-in-out infinite;
    }
    #pulse-ring::after {
      content: '';
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      border: 1px solid rgba(255,94,126,0.07);
      animation: pulse-ring 2.8s 0.7s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: translate(-50%,-50%) scale(0.9); opacity: 0.6; }
      50%  { transform: translate(-50%,-50%) scale(1.08); opacity: 0.2; }
      100% { transform: translate(-50%,-50%) scale(0.9); opacity: 0.6; }
    }

    /* EKG line decoration */
    .ekg-line {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%);
      width: 220px; height: 32px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
    }
  </style>
</head>
<body>

  <div id="pulse-ring"></div>

  <!-- NAV -->
  <nav class="page-header">
    <span class="logo-dot" style="background:var(--accent-rose);box-shadow:0 0 10px var(--accent-rose);"></span>
    <strong>Heart Explorer</strong>
    <a class="back-link" href="index.html">← Back to CardioVerse</a>
  </nav>

  <!-- Checkpoint overlay -->
  <div id="textOverlay">
    <div id="checkpointTitle"></div>
    <div id="checkpointDesc"></div>
  </div>

  <!-- Language toggle -->
  <div id="langButtons">
    <button id="lang-en" class="active" aria-label="English">EN</button>
    <button id="lang-ms" aria-label="Malay">BM</button>
  </div>

  <!-- 3D canvas + JS -->
  <div id="container">
    <div id="canvasContainer"></div>
    <div id="checkpointInfo"   style="display:none;"></div>
    <div id="checkpointButtons" style="display:none;">
      <button id="prevCheckpoint">Previous</button>
      <button id="nextCheckpoint">Next</button>
    </div>
    <script type="module" src="/src/heart.js"></script>

    <!-- Info popup -->
    <div id="infoPopup">
      <h2 id="popupTitle">Title</h2>
      <p  id="popupText">Explanation text goes here.</p>
      <button onclick="document.getElementById('infoPopup').style.display='none'">Close</button>
    </div>
  </div>

  <!-- EKG SVG decoration -->
  <svg class="ekg-line" viewBox="0 0 220 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline
      points="0,16 30,16 40,4 50,28 60,16 80,16 90,2 95,30 100,16 130,16 140,4 150,28 160,16 190,16 200,2 205,30 210,16 220,16"
      stroke="#ff5e7e" stroke-width="1.5" fill="none"
      stroke-dasharray="300" stroke-dashoffset="300">
      <animate attributeName="stroke-dashoffset" from="300" to="-300" dur="2.4s" repeatCount="indefinite"/>
    </polyline>
  </svg>

</body>
</html>
