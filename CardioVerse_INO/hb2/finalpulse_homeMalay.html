    <title>HeartBeat❤❤❤</title>

    <style>
        body{
            background-image: linear-gradient(#D1F3FF,#FFFFFF);
        }
        html, body {
            height: 100%;    
            margin: 0;         
            padding: 0;        
            border: 5px solid #6C98C5;
            box-sizing: border-box; 
            overflow: hidden;
        }
        p{
            font-family: "Press Start 2P", system-ui;
            font-weight: 400;
            font-style: normal;
            font-size: 90px;
            display: inline;
            justify-content: center;
            align-self: center;
            text-shadow: 10px 10px 7px #FFB3A7;
        }
        #title1{
            font-size: 90px;
            background: #48879C; 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; 
            text-shadow: none;
        }
        #title{
            font-size: 90px;
            background: linear-gradient(to right,#48879C,#45B8DE); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; 
            text-shadow: none;
        }
        #shadow{
            font-size: 90px;
            position: absolute;
            transform: translate(12%,120%);
            color: #FFFFFF;
            z-index: 0;
            text-shadow:
                -3px -3px #FFFFFF,
                 3px -3px #FFFFFF,
                -3px  3px #FFFFFF,
                 3px  3px #FFFFFF,
                 0px -3px #FFFFFF,
                 0px  3px #FFFFFF,
                -3px  0px #FFFFFF,
                 3px  0px #FFFFFF;
        }
        #titlebox{
            position: absolute;
            transform: translate(12%,210%);
            z-index: 1;
        }
        #suncloud{
            width: 400px;
            position: absolute;
            transform: translate(280%,-25%);
        }
        #desc{
            font-size: 30px;
            color: #235386; 
            position: absolute;
            transform: translate(15%,920%);
            text-shadow:
                -3px -3px #FFFFFF,
                 3px -3px #FFFFFF,
                -3px  3px #FFFFFF,
                 3px  3px #FFFFFF,
                 0px -3px #FFFFFF,
                 0px  3px #FFFFFF,
                -3px  0px #FFFFFF,
                 3px  0px #FFFFFF;
        }
        #enterBtn{
            font-family: "Press Start 2P", system-ui;
            font-weight: 400;
            font-style: normal;
            font-size: 90px;
            justify-content: center;
            align-self: center;
            color: #FFFFFF;
            text-shadow:
                -1px -1px #655A5A,
                 1px -1px #655A5A,
                -1px  1px #655A5A,
                 1px  1px #655A5A,
                 0px -1px #655A5A,
                 0px  1px #655A5A,
                -1px  0px #655A5A,
                 1px  0px #655A5A;

            padding-left: 100px;
            padding-right: 100px;
            background-color: #83B6D6;
            border: 5px solid #4F91BA;
            position: absolute;
            white-space: nowrap;
            transform: translate(66%,245%);
        }
        a{
            text-decoration: none;
            position: absolute;
        }
        #cloud1{
            width: 1500px;
            position: absolute;
            transform: translate(-16%,102%);
            z-index: -1;
        }
        #cloud2{
            width: 1500px;
            position: absolute;
            transform: translate(37%,102%);
            z-index: -1;
        }
        #line1{
            height: 10px;
            background-color: #6C98C5;
            border: none;
            position: fixed;  
            bottom: -8px;
            left: 0;
            width: 100%;
            z-index: 1;
        }
        #line2{
            height: 10px;
            background-color: #6C98C5;
            border: none;
            position: fixed;  
            bottom: -8px;
            left: -767px;
            width: 100%;
            z-index: 1;
            rotate: 90deg;
        }
        #line3{
            height: 10px;
            background-color: #6C98C5;
            border: none;
            position: fixed;  
            bottom: -8px;
            right: -767px;
            width: 100%;
            z-index: 1;
            rotate: 90deg;
        }
        #backBtn{
            font-family: "Press Start 2P", system-ui;
            font-weight: 400;
            font-style: normal;
            font-size: 30px;
            justify-content: center;
            align-self: center;
            color: #FFFFFF;

                -1px -1px #655A5A,
                 1px -1px #655A5A,
                -1px  1px #655A5A,
                 1px  1px #655A5A,
