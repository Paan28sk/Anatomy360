                 3px  3px #112D81,

        #text{

        #question{

            font-optical-sizing: auto;

            display: flex;

        }
        #ans2{
            font-size: 50px;
            font-family: "Press Start 2P", system-ui;

            display: flex;

            border: 5px solid #D84E4D;

            font-size: 30px;

            width: 350px;
        }
        #ansBox{
            display: flex;
            justify-content: space-evenly;
            position: relative;
            top: 67%;
        }
        #wrong1{
            font-family: "Press Start 2P", system-ui;

            color: #CB0909;

            text-shadow: none;

            transform: translate(118%,1520%);

        }
        #wrong2{
            font-family: "Press Start 2P", system-ui;
            font-weight: 700;
            font-style: normal;
            color: #CB0909;
            border-radius: 20px;
            background-color: transparent;
            font-size: 30px;
            text-shadow: none;
            position: absolute;
            transform: translate(376.5%,1520%);
            transition: 0.5s;
        }
        #anstrue{
            font-family: "Press Start 2P", system-ui;
            font-weight: 700;
            font-style: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid #0B874D;
            color: #2EB772;
            border-radius: 20px;
            background-color: transparent;

        #nextBtn{
            font-family: "Press Start 2P", system-ui;
            font-weight: 400;
            font-style: normal;
            font-size: 30px;
            justify-content: center;
            align-self: center;
            color: #FFFFFF;
            padding: 15px;
            padding-left: 30px;
            padding-right: 30px;
            background-color: #D5DF0D;
            border: 5px solid #9AA10D;
            position: absolute;
            transform: translate(158%,0%);
        }
        a{
            position: absolute;
        }
        .WrongAnim{
            animation-name: WrongAnim;
            animation-duration: 500ms;
            animation-iteration-count: 1;
            animation-timing-function: ease;
        }
        @keyframes WrongAnim{
            0%{
                opacity: 0;
            }
            100%{
                opacity: 1;
            }
        }
        #love1{
            width: 150px;
            position: absolute;
            transform: translate(160%,-60%);
        }
        #love2{
            width: 150px;
            position: absolute;
            transform: translate(775%,-60%);
        }
        #fire1{
            width: 120px;
            position: absolute;
            transform: translate(310%,42%);
        }
        #fire2{
            width: 120px;
            position: absolute;
            transform: translate(870%,42%);

<body>
    <p id="title1">CABARAN KILAT</p>
    <p id="title2">HEARTBEAT HERO!</p>

    <img id="timer" src="timergif.gif" alt="timer">

    <p id="text">Jawab soalan dalam 10<br>saat.<br>Klik jawapan yang betul!</p>

    <button id="question">Nod manakah yang mencetuskan degupan jantung?</button>

    <div id="ansBox">
        <button id="ans1">GENTIAN<br>PURKINJE</button>
        <button id="ans2">NOD AV</button>
        <button id="ans3">NOD<br>SINOATRIUM</button>
    </div>

    <p id="wrong1">SALAH!</p>
    <p id="wrong2">SALAH!</p>

    <a href="hbhero2Malay.html">
    <button id="nextBtn">SETERUSNYA</button>
    </a>

    <img id="love1" src="love.png" alt="love">
    <img id="love2" src="love.png" alt="love">

    <img id="fire1" src="fire.png" alt="fire">
    <img id="fire2" src="fire.png" alt="fire">



    <script>
        const ans1 = document.getElementById("ans1");
        const ans2 = document.getElementById("ans2");
        const ans3 = document.getElementById("ans3");

        const wrong1 = document.getElementById("wrong1");
        const wrong2 = document.getElementById("wrong2");

        const timer = document.getElementById("timer");
        const nextBtn = document.getElementById("nextBtn");

        wrong1.style.visibility = "hidden";
        wrong2.style.visibility = "hidden";
        nextBtn.style.visibility = "hidden";

        let done = false;
        let timeoutId; 


        function endQuestion() {
            if (done) return; 
    
            ans3.id = "anstrue";
    
            ans1.style.pointerEvents = "none";
            ans2.style.pointerEvents = "none";
            ans3.style.pointerEvents = "none";

            timer.style.visibility = "hidden";
            nextBtn.style.visibility = "visible";
    
            wrong1.style.visibility = "visible";
            wrong2.style.visibility = "visible";
    
            wrong1.classList.remove("WrongAnim");
            void wrong1.offsetWidth;        
            wrong1.classList.add("WrongAnim"); 
    
            wrong2.classList.remove("WrongAnim");
            void wrong2.offsetWidth;        
            wrong2.classList.add("WrongAnim"); 
    
            nextBtn.classList.remove("WrongAnim");
            void nextBtn.offsetWidth;        
            nextBtn.classList.add("WrongAnim");
    
            done = true;
        }

        timeoutId = setTimeout(endQuestion, 10000);

        ans1.onclick = function() {
            clearTimeout(timeoutId); 
            endQuestion();
        }

        ans2.onclick = function() {
            clearTimeout(timeoutId); 
            endQuestion();
        }

        ans3.onclick = function() {
            clearTimeout(timeoutId);
            endQuestion();
        }
    </script>
</body>
</html>
