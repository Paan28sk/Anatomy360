<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardioVerse — Heart Explorer</title>
  <link rel="stylesheet" href="src/style.css" />
  <style>
    /* ── Heart page overrides (dark 3D environment) ── */
    body {
      overflow: hidden;
      display: block;
      place-items: unset;
      background: var(--bg-deep);
    }

    canvas { display: block; }

    /* ── Ambient pink glow (behind canvas, non-blocking) ── */
    .ambient-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(255,199,199,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 70% 30%, rgba(255,226,226,0.07) 0%, transparent 60%);
    }

    /* ── Subtle scan lines ── */
    .scan-overlay {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,199,199,0.012) 3px,
        rgba(255,199,199,0.012) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Heartbeat ring (cosmetic only, behind everything) ── */
    #pulse-ring {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(255,199,199,0.13);
      pointer-events: none;
      z-index: 0;
      animation: pulse-ring 2.8s ease-in-out infinite;
    }

    #pulse-ring::after {
      content: '';
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      border: 1px solid rgba(255,226,226,0.07);
      animation: pulse-ring 2.8s 0.8s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { transform: translate(-50%,-50%) scale(0.92); opacity: 0.55; }
      50%       { transform: translate(-50%,-50%) scale(1.07); opacity: 0.18; }
    }

    /* ── Heart status tag (top-right) ── */
    .heart-status {
      position: fixed;
      top: 64px; right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 0.68rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent-rose);
      z-index: 1100;
      opacity: 0.75;
    }

    .heart-status .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-rose);
      box-shadow: 0 0 8px var(--accent-rose);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── EKG decoration (bottom, cosmetic only) ── */
    .ekg-line {
      position: fixed;
      bottom: 70px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 28px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.28;
    }

    /* ── Override accent colors for heart-specific UI ── */
    #langButtons button.active {
      background: rgba(255,199,199,0.14);
      color: var(--accent-rose);
      border-color: rgba(255,199,199,0.40);
    }

    .heart-label {
      border-color: rgba(255,199,199,0.35);
    }

    .heart-label:hover {
      border-color: var(--accent-rose);
      background: rgba(255,199,199,0.14);
      box-shadow: 0 0 14px rgba(255,199,199,0.28);
    }
  </style>
</head>
<body>

  <!-- Cosmetic layers (z-index 0, non-blocking) -->
  <div class="ambient-glow"></div>
  <div class="scan-overlay"></div>
  <div id="pulse-ring"></div>

  <!-- NAV (z-index 1000) -->
  <nav class="page-header">
    <span class="logo-dot" style="background:var(--accent-rose); box-shadow:0 0 10px var(--accent-rose);"></span>
    <strong>Heart Explorer</strong>
    <a class="back-link" href="index.html">← Back to CardioVerse</a>
  </nav>

  <!-- Status indicator -->
  <div class="heart-status">
    <span class="pulse-dot"></span>
    Cardiac Scan Active
  </div>

  <!-- Checkpoint overlay (bottom-left, z-index 1100) -->
  <div id="textOverlay">
    <div id="checkpointTitle"></div>
    <div id="checkpointDesc"></div>
  </div>

  <!-- Language toggle -->
  <div id="langButtons">
    <button id="lang-en" class="active" aria-label="English">EN</button>
    <button id="lang-ms" aria-label="Malay">BM</button>
  </div>

  <!-- 3D canvas container (z-index 1, fills viewport) -->
  <div id="container">
    <div id="canvasContainer"></div>
    <div id="checkpointInfo"    style="display:none;"></div>
    <div id="checkpointButtons" style="display:none;">
      <button id="prevCheckpoint">Previous</button>
      <button id="nextCheckpoint">Next</button>
    </div>
    <script type="module" src="/src/heart.js"></script>

    <!-- Info popup -->
    <div id="infoPopup">
      <h2 id="popupTitle">Title</h2>
      <p  id="popupText">Explanation text goes here.</p>
      <button onclick="document.getElementById('infoPopup').style.display='none'">Close</button>
    </div>
  </div>

  <!-- EKG SVG decoration (cosmetic, non-blocking) -->
  <svg class="ekg-line" viewBox="0 0 200 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline
      points="0,14 28,14 36,3 46,25 54,14 74,14 82,2 87,26 92,14 118,14 126,3 136,25 144,14 168,14 176,2 181,26 186,14 200,14"
      stroke="#FFC7C7" stroke-width="1.4" fill="none"
      stroke-dasharray="280" stroke-dashoffset="280">
      <animate attributeName="stroke-dashoffset" from="280" to="-280" dur="2.4s" repeatCount="indefinite"/>
    </polyline>
  </svg>

</body>
</html>
