<body>
    <img id="aorta" src="aorta.png" alt="aorta">

    <div id="contentbox">

    </div>

    <div id="funfactBox">
        <p id="title">ADAKAH ANDA TAHU?</p>

    </a>

    <div id="wrongBox">
        <p id="questionLabel">Mengapa jawapan<br>ini salah?</p>
        <button id="ans1New">A) Mengangkut darah<br>terdeoksigen<br>daripada hati.</button>
        <br>
        <button id="wrongExplainLabel">Ini ialah<br>fungsi untuk<p id="textVena">vena kava!</p></button>
    </div>





    <script>
        const funfactBtn = document.getElementById("funfactBtn");
        const functionBtn = document.getElementById("functionBtn");

        const contentbox = document.getElementById("contentbox");
        const funfactBox = document.getElementById("funfactBox");

        const backBtn = document.getElementById("backBtn");
        const backBtn2 = document.getElementById("backBtn2");

        backBtn2.style.visibility = "hidden";
        functionBtn.style.visibility = "hidden";
        funfactBox.style.visibility = "hidden";

        funfactBtn.onclick = function(){
            funfactBtn.style.visibility = "hidden";
            functionBtn.style.visibility = "visible";

            funfactBox.style.visibility = "visible";
            contentbox.style.visibility = "hidden";
        }

        functionBtn.onclick = function(){
            functionBtn.style.visibility = "hidden";
            funfactBtn.style.visibility = "visible";

            contentbox.style.visibility = "visible";
            funfactBox.style.visibility = "hidden";
        }


        const answer1 = document.getElementById("ans1");
        const answer2 = document.getElementById("ans2");
        const goodjobBtn = document.getElementById("goodjobBtn");
        const whyBtn = document.getElementById("whyBtn");

        const question = document.getElementById("question");
        const questionBox = document.getElementById("questionBox");
        const wrongBox = document.getElementById("wrongBox");

        questionBox.style.visibility = "hidden";
        wrongBox.style.visibility = "hidden";

        question.onclick = function(){
            answer1.id = "ans1";
            answer2.id = "ans2";

            questionBox.style.visibility = "visible";
            functionBtn.style.visibility = "hidden";
            funfactBtn.style.visibility = "hidden";

            funfactBox.style.visibility = "visible";
            contentbox.style.visibility = "hidden";
            backBtn.style.visibility = "hidden";

            backBtn2.style.visibility = "visible";
        }

        goodjobBtn.style.visibility = "hidden";
        whyBtn.style.visibility = "hidden";

        answer1.onclick = function(){
            answer1.id = "ans1Anim";
            whyBtn.style.visibility = "visible";
            answer2.disabled = true;
            answer2.id = "ans2Disabled";
        }

        answer2.onclick = function(){
            answer2.id = "ans2New";
            goodjobBtn.style.visibility = "visible";
            answer1.disabled = true;
            answer1.id = "ans1Disabled";
        }

        goodjobBtn.onclick = function(){
            questionBox.id = "questionBoxClose";

            questionBox.style.visibility = "hidden";
            functionBtn.style.visibility = "hidden";
            funfactBtn.style.visibility = "visible";

            funfactBox.style.visibility = "hidden";
            contentbox.style.visibility = "visible";
            backBtn.style.visibility = "visible";

            backBtn2.style.visibility = "hidden";

            answer2.id = "ans2";
            goodjobBtn.style.visibility = "hidden";
            answer1.disabled = false;
            answer1.id = "ans1";
        }

        const questionLabel = document.getElementById("questionLabel");
        const checkBtn = document.getElementById("checkBtn");

        

        checkBtn.style.visibility = "hidden";
        /*
        whyBtn.onclick = function(){
            wrongBox.style.visibility = "visible";
            wrongBox.classList.remove("popUpAnim"); // reset
            void wrongBox.offsetWidth;              // force reflow
            wrongBox.classList.add("popUpAnim");

            questionBox.style.visibility = "hidden";
            wrongBox.style.visibility = "visible";
            wrongBox.style.animationPlayState = "running";

            whyBtn.style.visibility = "hidden";
            question.disabled = true;

            checkBtn.style.visibility = "visible";

        }
        */

        whyBtn.onclick = function(){
            // show + restart animation
            answer1.id = "ans1New";

            wrongBox.style.visibility = "visible";
            wrongBox.classList.remove("popUpAnim");
            void wrongBox.offsetWidth;          // reflow to reset
            wrongBox.classList.add("popUpAnim");

            // rest of your logic
            questionBox.style.visibility = "hidden";
            whyBtn.style.visibility = "hidden";
            question.disabled = true;
            checkBtn.style.visibility = "visible";
        };

        wrongBox.addEventListener("animationend", () => {
        wrongBox.classList.remove("popUpAnim");
        });

        checkBtn.onclick = function(){
            checkBtn.style.visibility = "hidden";
            wrongBox.style.visibility = "hidden";

            question.disabled = false;

            questionBox.style.visibility = "hidden";
            functionBtn.style.visibility = "hidden";
            funfactBtn.style.visibility = "visible";

            funfactBox.style.visibility = "hidden";
            contentbox.style.visibility = "visible";

            backBtn.style.visibility = "visible";
            backBtn2.style.visibility = "hidden";
            
            answer1.id = "ans1";
            answer2.id = "ans2";
            answer2.disabled = false;
        }

        backBtn2.onclick = function(){
            whyBtn.style.visibility = "hidden";
            checkBtn.style.visibility = "hidden";
            wrongBox.style.visibility = "hidden";
            goodjobBtn.style.visibility = "hidden";

            question.disabled = false;

            questionBox.style.visibility = "hidden";
            functionBtn.style.visibility = "hidden";
            funfactBtn.style.visibility = "visible";

            funfactBox.style.visibility = "hidden";
            contentbox.style.visibility = "visible";

            backBtn.style.visibility = "visible";
            backBtn2.style.visibility = "hidden";
            
            answer1.id = "ans1";
            answer2.id = "ans2";
            answer1.disabled = false;
            answer2.disabled = false;
        }

    </script>
